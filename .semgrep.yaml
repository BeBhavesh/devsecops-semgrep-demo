rules:
  - id: hardcoded-secret
    pattern: const $KEY = "..."
    message: Hardcoded secret detected!
    languages: [javascript]
    severity: ERROR

  - id: sql-injection
    pattern: pool.query($QUERY)
    message: Possible SQL Injection!
    languages: [javascript]
    severity: ERROR

  - id: weak-jwt
    pattern-regex: "jwt\\.sign\\([^,]+,[^,]+\\)(?!.*,\\s*\\{\\s*expiresIn\\s*:)"

    message: JWT without expiry!
    languages: [javascript]
    severity: WARNING
